version: '3.8'

# ── AstroBot Docker Compose ─────────────────────────────────────
# Connects to an external n8n network where the PostgreSQL
# container (postgre_container) already lives.

services:
  astrobot:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: astrobot
    image: astrobot:latest

    ports:
      - "3000:3000"

    environment:
      # Server
      - NODE_ENV=production
      - PORT=3000

      # Security
      - JWT_SECRET=astrobot_super_secret_key_2024

      # PostgreSQL (uses existing postgre_container on the shared network)
      - DB_HOST=postgre_container
      - DB_PORT=5432
      - DB_NAME=mydatabase
      - DB_USER=tidiane
      - DB_PASSWORD=tidkon

      # n8n webhook URL
      - N8N_WEBHOOK=http://76.13.62.195:5678/webhook/astrobot

      # HuggingFace API key for image generation
      - HF_API_KEY=hf_yurxGKSFQBTsadQsfpQBNwrHJKuYGecmx

    networks:
      - n8n_container_n8n-net

    restart: unless-stopped

    # Resource limits (adjust as needed)
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 128M

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => r.statusCode === 200 ? process.exit(0) : process.exit(1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

# ── Networks ────────────────────────────────────────────────────
networks:
  n8n_container_n8n-net:
    external: true
    # This network is created and managed by the n8n docker-compose stack.
    # Ensure n8n is running and this network exists before deploying AstroBot.
