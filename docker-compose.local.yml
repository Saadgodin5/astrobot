# AstroBot - Local development (PostgreSQL + app)
# Run: docker compose -f docker-compose.local.yml up --build

services:
  postgres:
    image: postgres:16-alpine
    container_name: astrobot_postgres
    environment:
      POSTGRES_DB: mydatabase
      POSTGRES_USER: tidiane
      POSTGRES_PASSWORD: tidkon
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tidiane -d mydatabase"]
      interval: 5s
      timeout: 5s
      retries: 5

  astrobot:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: astrobot
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      JWT_SECRET: astrobot_super_secret_key_2024
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: mydatabase
      DB_USER: tidiane
      DB_PASSWORD: tidkon
