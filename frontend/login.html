<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="AstroBot — Login to your space station" />
  <title>AstroBot — Welcome Back</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Inter:wght@300;400;500;600;700&family=Exo+2:wght@300;400;600&display=swap" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Star field background -->
  <div class="stars-canvas" aria-hidden="true"></div>

  <!-- Toast container -->
  <div class="toast-container" id="toastContainer" aria-live="assertive" aria-atomic="true"></div>

  <!-- Back to home -->
  <a href="index.html" class="back-link" aria-label="Back to home">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
      <polyline points="15 18 9 12 15 6"/>
    </svg>
    Back
  </a>

  <!-- Auth page -->
  <div class="auth-page">
    <div class="auth-card glass-card">

      <!-- Header -->
      <div class="auth-header">
        <div class="auth-logo">
          <!-- Small robot SVG 40px -->
          <svg width="40" height="46" viewBox="0 0 200 240" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <defs>
              <radialGradient id="lb-body" cx="40%" cy="30%" r="70%">
                <stop offset="0%" stop-color="#ffffff"/>
                <stop offset="100%" stop-color="#b8d9f0"/>
              </radialGradient>
              <radialGradient id="lb-eye" cx="35%" cy="30%" r="65%">
                <stop offset="0%" stop-color="#80deea"/>
                <stop offset="40%" stop-color="#00d4ff"/>
                <stop offset="100%" stop-color="#006064"/>
              </radialGradient>
              <linearGradient id="lb-cape" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#1a73e8"/>
                <stop offset="100%" stop-color="#0d47a1"/>
              </linearGradient>
              <filter id="lb-glow" x="-30%" y="-30%" width="160%" height="160%">
                <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
                <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
              </filter>
            </defs>
            <line x1="100" y1="10" x2="100" y2="40" stroke="#4dd0e1" stroke-width="3" stroke-linecap="round"/>
            <circle cx="100" cy="8" r="6" fill="#00d4ff">
              <animate attributeName="opacity" values="0.8;1;0.8" dur="1.8s" repeatCount="indefinite"/>
            </circle>
            <rect x="55" y="38" width="90" height="70" rx="20" fill="url(#lb-body)"/>
            <rect x="66" y="55" width="28" height="18" rx="5" fill="#0d1b35"/>
            <rect x="106" y="55" width="28" height="18" rx="5" fill="#0d1b35"/>
            <rect x="68" y="57" width="24" height="14" rx="4" fill="url(#lb-eye)" filter="url(#lb-glow)" stroke="rgba(0,212,255,0.9)" stroke-width="1.5"/>
            <rect x="108" y="57" width="24" height="14" rx="4" fill="url(#lb-eye)" filter="url(#lb-glow)" stroke="rgba(0,212,255,0.9)" stroke-width="1.5"/>
            <rect x="70" y="59" width="7" height="5" rx="2" fill="white" opacity="0.6"/>
            <rect x="110" y="59" width="7" height="5" rx="2" fill="white" opacity="0.6"/>
            <rect x="88" y="108" width="24" height="12" rx="4" fill="#dce8f0"/>
            <rect x="50" y="118" width="100" height="80" rx="22" fill="url(#lb-body)"/>
            <circle cx="100" cy="155" r="8" fill="none" stroke="#00d4ff" stroke-width="1.5"/>
            <circle cx="100" cy="155" r="4" fill="url(#lb-eye)" filter="url(#lb-glow)">
              <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" repeatCount="indefinite"/>
            </circle>
            <path d="M 58 125 Q 30 160 38 210 L 50 205 Q 52 175 62 155 Z" fill="url(#lb-cape)" opacity="0.85"/>
            <path d="M 142 125 Q 170 160 162 210 L 150 205 Q 148 175 138 155 Z" fill="url(#lb-cape)" opacity="0.85"/>
          </svg>
          <span class="auth-logo-name">ASTROBOT</span>
        </div>
        <h1 class="auth-title">Welcome Back</h1>
        <p class="auth-subtitle">Login to your space station</p>
      </div>

      <!-- Alert -->
      <div id="alertMsg" class="alert alert-error" role="alert" aria-live="polite"></div>

      <!-- Login Form -->
      <form id="loginForm" class="auth-form" novalidate>

        <!-- Email -->
        <div class="input-group">
          <label for="email">Email Address</label>
          <div class="input-wrap">
            <span class="input-icon" aria-hidden="true">
              <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="2" y="4" width="20" height="16" rx="2"/>
                <polyline points="2,4 12,13 22,4"/>
              </svg>
            </span>
            <input
              type="email"
              id="email"
              name="email"
              class="input-field"
              placeholder="commander@space.io"
              autocomplete="email"
              required
              aria-required="true"
            />
          </div>
        </div>

        <!-- Password -->
        <div class="input-group">
          <label for="password">Password</label>
          <div class="input-wrap">
            <span class="input-icon" aria-hidden="true">
              <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="11" width="18" height="11" rx="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
            </span>
            <input
              type="password"
              id="password"
              name="password"
              class="input-field has-toggle"
              placeholder="••••••••••"
              autocomplete="current-password"
              required
              aria-required="true"
            />
            <button type="button" class="input-toggle" id="togglePwd" aria-label="Toggle password visibility">
              <svg id="eyeOpen" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
              <svg id="eyeClosed" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            </button>
          </div>
        </div>

        <!-- Submit -->
        <button type="submit" class="btn btn-orange" id="submitBtn" style="width:100%;justify-content:center;margin-top:4px;">
          <span id="btnText" style="display:flex;align-items:center;gap:8px;">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
              <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
              <polyline points="10 17 15 12 10 7"/>
              <line x1="15" y1="12" x2="3" y2="12"/>
            </svg>
            Login
          </span>
          <span id="btnSpinner" style="display:none;"><span class="spinner"></span></span>
        </button>

      </form>

      <!-- Footer -->
      <div class="auth-footer">
        Don't have an account? <a href="register.html">Register</a>
      </div>

    </div>
  </div>

  <script>
    // Redirect if already logged in
    const _t = localStorage.getItem('astrobot_token');
    const _u = localStorage.getItem('astrobot_user');
    if (_t && _u) { window.location.href = 'chat.html'; }

    const form       = document.getElementById('loginForm');
    const alertMsg   = document.getElementById('alertMsg');
    const submitBtn  = document.getElementById('submitBtn');
    const btnText    = document.getElementById('btnText');
    const btnSpinner = document.getElementById('btnSpinner');

    // Password toggle
    document.getElementById('togglePwd').addEventListener('click', function() {
      const pwd = document.getElementById('password');
      const isPassword = pwd.type === 'password';
      pwd.type = isPassword ? 'text' : 'password';
      document.getElementById('eyeOpen').style.display = isPassword ? 'none' : 'block';
      document.getElementById('eyeClosed').style.display = isPassword ? 'block' : 'none';
    });

    function showAlert(msg) {
      alertMsg.textContent = msg;
      alertMsg.classList.add('show');
    }
    function hideAlert() {
      alertMsg.classList.remove('show');
    }

    function showToast(msg, type) {
      const c = document.getElementById('toastContainer');
      const t = document.createElement('div');
      t.className = 'toast toast-' + type;
      t.textContent = msg;
      c.appendChild(t);
      setTimeout(() => t.remove(), 4000);
    }

    form.addEventListener('submit', async function(e) {
      e.preventDefault();
      hideAlert();

      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email) { showAlert('Please enter your email address.'); return; }
      if (!password) { showAlert('Please enter your password.'); return; }

      submitBtn.disabled = true;
      btnText.style.display = 'none';
      btnSpinner.style.display = 'inline-block';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();

        if (data.success || data.token) {
          localStorage.setItem('astrobot_token', data.token);
          localStorage.setItem('astrobot_user', JSON.stringify(data.user));
          showToast('Welcome back, Commander ' + data.user.name + '!', 'success');
          setTimeout(() => { window.location.href = 'chat.html'; }, 700);
        } else {
          showAlert(data.message || 'Invalid credentials. Please try again.');
          submitBtn.disabled = false;
          btnText.style.display = 'flex';
          btnSpinner.style.display = 'none';
        }
      } catch (err) {
        showAlert('Connection error. Please check your network.');
        submitBtn.disabled = false;
        btnText.style.display = 'flex';
        btnSpinner.style.display = 'none';
      }
    });
  </script>
</body>
</html>
